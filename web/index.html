<!doctype html>
<html lang="en" class="overflow-x-hidden dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Simple Photos" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Simple Photos</title>
    <script>
      // Apply theme before first paint to prevent flash of wrong theme.
      // Default is "dark" when no preference has been saved.
      (function() {
        var t = localStorage.getItem('theme') || 'dark';
        if (t === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      })();

      // Register the PWA service worker (required for installability).
      // Only registers in production-ish contexts (https or localhost).
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function (err) {
            console.warn('[PWA] Service worker registration failed:', err);
          });
        });
      }
    </script>
  </head>
  <body class="bg-gray-50 dark:bg-gray-900 min-h-screen overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
