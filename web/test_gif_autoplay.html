<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIF Autoplay-on-Scroll Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; }
  h1 { text-align: center; padding: 16px; font-size: 18px; }
  .instructions { text-align: center; padding: 0 16px 16px; color: #aaa; font-size: 14px; }
  .spacer { height: 110vh; display: flex; align-items: center; justify-content: center;
    font-size: 24px; color: #555; border-bottom: 1px dashed #333; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 4px; padding: 4px; }
  .tile { position: relative; width: 100%; aspect-ratio: 1; overflow: hidden;
    background: #2a2a3e; border: 2px solid transparent; transition: border-color 0.15s; }
  .tile.full-gif { border-color: #0f0; }
  .tile.thumb-only { border-color: #ff0; }
  .tile.loading { border-color: #f80; }
  .tile img { width: 100%; height: 100%; object-fit: cover; }
  .badge { position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.6);
    color: #fff; font-size: 11px; padding: 2px 6px; border-radius: 4px; }
  .state-label { position: absolute; top: 4px; left: 4px; font-size: 10px; font-weight: bold;
    padding: 2px 6px; border-radius: 4px; }
  .state-label.full-gif { background: #0f0; color: #000; }
  .state-label.thumb-only { background: #ff0; color: #000; }
  .state-label.loading { background: #f80; color: #000; }
  #log { position: fixed; bottom: 0; left: 0; right: 0; max-height: 160px;
    overflow-y: auto; background: #111; border-top: 1px solid #333;
    font-family: monospace; font-size: 12px; padding: 8px; z-index: 10; }
  #log .pass { color: #0f0; }
  #log .fail { color: #f44; }
  #log .info { color: #8cf; }
  #results { position: fixed; top: 8px; right: 8px; background: #222; border: 1px solid #444;
    padding: 8px 14px; border-radius: 8px; font-size: 13px; z-index: 20; }
  #results.pass { border-color: #0f0; }
  #results.fail { border-color: #f44; }
</style>
</head>
<body>

<h1>GIF Full-Image Autoplay Test</h1>
<p class="instructions">
  GIF tiles load the full animated file when scrolled into view (green = full GIF loaded, yellow = thumbnail only).<br>
  Scroll down to see GIF tiles appear and animate.
</p>
<div id="results">Tests: pending</div>
<div id="log"></div>

<!-- Spacer so GIF tiles start off-screen -->
<div class="spacer">↓ Scroll down to reach GIF tiles ↓</div>

<div class="grid" id="gallery"></div>

<!-- Another spacer after the grid -->
<div class="spacer">↑ Scroll up to observe GIF tiles ↑</div>

<script>
// ── Tiny 2-frame animated GIF (10x10, red/blue alternating) ──────────────
const ANIMATED_GIF_B64 =
  "R0lGODlhCgAKAPAAAP8AAP///yH/C05FVFNDQVBFMi4wAwEAAAAh+QQJCgACACwAAAAA" +
  "CgAKAAACB4SPqcvtDwUAIfkECQoAAgAsAAAAAAoACgAAAgmEj6nL7Q8KBQA7";

function b64ToBlob(b64, mime) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new Blob([bytes], { type: mime });
}

// ── Logging ──────────────────────────────────────────────────────────────
const logEl = document.getElementById("log");
const resultsEl = document.getElementById("results");
let passed = 0, failed = 0;

function log(msg, cls = "info") {
  const d = document.createElement("div");
  d.className = cls;
  d.textContent = `[${new Date().toISOString().slice(11,23)}] ${msg}`;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}

function assert(cond, msg) {
  if (cond) { log(`✓ ${msg}`, "pass"); passed++; }
  else      { log(`✗ ${msg}`, "fail"); failed++; }
  resultsEl.textContent = `Tests: ${passed} passed, ${failed} failed`;
  resultsEl.className = failed > 0 ? "fail" : "pass";
}

// ── Simulate the MediaTile GIF loading approach ──────────────────────────
// 1. Thumbnail shown immediately on visibility
// 2. Full GIF loaded when tile enters viewport (simulating download+decrypt)
// 3. Full GIF displayed once loaded

const gallery = document.getElementById("gallery");
const TILE_COUNT = 12;
const tiles = [];

// Simulate async "download+decrypt" with a small delay
function simulateFullGifLoad() {
  return new Promise((resolve) => {
    setTimeout(() => {
      const blob = b64ToBlob(ANIMATED_GIF_B64, "image/gif");
      resolve(URL.createObjectURL(blob));
    }, 200 + Math.random() * 300); // 200-500ms simulated network
  });
}

for (let i = 0; i < TILE_COUNT; i++) {
  const isGif = i % 3 === 0;
  const tile = document.createElement("div");
  tile.className = "tile";
  tile.dataset.index = i;
  tile.dataset.isGif = isGif;
  tile.dataset.state = "idle";

  const img = document.createElement("img");
  img.alt = isGif ? `GIF tile ${i}` : `Photo tile ${i}`;

  const badge = document.createElement("div");
  badge.className = "badge";
  badge.textContent = isGif ? "GIF" : "Photo";

  const stateLabel = document.createElement("div");
  stateLabel.className = "state-label";
  stateLabel.textContent = "—";

  tile.appendChild(img);
  tile.appendChild(badge);
  tile.appendChild(stateLabel);
  gallery.appendChild(tile);

  const tileData = {
    el: tile, img, stateLabel, isGif,
    thumbUrl: null, fullGifUrl: null,
    visible: false, inView: false, loadingFull: false
  };
  tiles.push(tileData);

  // Create thumbnails for all tiles
  const canvas = document.createElement("canvas");
  canvas.width = canvas.height = 64;
  const ctx = canvas.getContext("2d");
  if (isGif) {
    // Static "thumbnail placeholder" for GIF (gray with GIF text)
    ctx.fillStyle = "#444";
    ctx.fillRect(0, 0, 64, 64);
    ctx.fillStyle = "#aaa";
    ctx.font = "bold 16px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("GIF", 32, 38);
  } else {
    ctx.fillStyle = `hsl(${i * 30}, 60%, 40%)`;
    ctx.fillRect(0, 0, 64, 64);
  }
  canvas.toBlob((blob) => {
    tileData.thumbUrl = URL.createObjectURL(blob);
  }, "image/jpeg");
}

// ── IntersectionObserver — mirrors the new MediaTile approach ────────────
const observer = new IntersectionObserver((entries) => {
  for (const entry of entries) {
    const idx = parseInt(entry.target.dataset.index);
    const td = tiles[idx];

    if (!td.isGif) {
      // Non-GIF: one-shot lazy load
      if (entry.isIntersecting && !td.visible) {
        td.visible = true;
        td.img.src = td.thumbUrl || "";
        observer.unobserve(entry.target);
      }
      continue;
    }

    // GIF tile: track in/out of view
    if (entry.isIntersecting) td.visible = true;
    td.inView = entry.isIntersecting;

    if (!td.visible) continue;

    // Show thumbnail immediately
    if (!td.img.src && td.thumbUrl) {
      td.img.src = td.thumbUrl;
      td.el.className = "tile thumb-only";
      td.stateLabel.textContent = "THUMB";
      td.stateLabel.className = "state-label thumb-only";
      td.el.dataset.state = "thumb-only";
    }

    // Load full GIF when entering viewport
    if (entry.isIntersecting && !td.fullGifUrl && !td.loadingFull) {
      td.loadingFull = true;
      td.el.className = "tile loading";
      td.stateLabel.textContent = "LOADING...";
      td.stateLabel.className = "state-label loading";
      td.el.dataset.state = "loading";

      simulateFullGifLoad().then((url) => {
        td.fullGifUrl = url;
        td.loadingFull = false;
        // Only show full GIF if still in view
        if (td.inView) {
          td.img.src = url;
          td.el.className = "tile full-gif";
          td.stateLabel.textContent = "▶ FULL GIF";
          td.stateLabel.className = "state-label full-gif";
          td.el.dataset.state = "full-gif";
        }
      });
    }

    // Swap to full GIF if already loaded and now back in view
    if (entry.isIntersecting && td.fullGifUrl) {
      td.img.src = td.fullGifUrl;
      td.el.className = "tile full-gif";
      td.stateLabel.textContent = "▶ FULL GIF";
      td.stateLabel.className = "state-label full-gif";
      td.el.dataset.state = "full-gif";
    }
  }
}, { rootMargin: "200px" });

tiles.forEach((td) => observer.observe(td.el));

// ── Automated Assertions ─────────────────────────────────────────────────
let initialChecked = false;

function runInitialAssertions() {
  if (initialChecked) return;
  initialChecked = true;
  log("— Initial state (GIF tiles should be off-screen) —");
  const gifTiles = tiles.filter(t => t.isGif);
  const allIdle = gifTiles.every(t => t.el.dataset.state === "idle" || t.el.dataset.state === "thumb-only");
  assert(allIdle, "GIF tiles start idle when off-screen");
  assert(!gifTiles[0].fullGifUrl, "First GIF tile has no full GIF loaded initially");
}

function runInViewAssertions() {
  log("— In-view check —");
  const gifTiles = tiles.filter(t => t.isGif);
  const withFullGif = gifTiles.filter(t => t.fullGifUrl);
  const inViewGifs = gifTiles.filter(t => t.inView);

  if (inViewGifs.length > 0) {
    // After a short delay, full GIFs should have loaded
    setTimeout(() => {
      const loaded = inViewGifs.filter(t => t.fullGifUrl);
      assert(loaded.length === inViewGifs.length,
        `${loaded.length}/${inViewGifs.length} in-view GIF tiles loaded full file`);
      loaded.forEach(t => {
        assert(t.img.src === t.fullGifUrl,
          `Tile ${t.el.dataset.index} shows full GIF URL (not thumbnail)`);
        assert(t.el.dataset.state === "full-gif",
          `Tile ${t.el.dataset.index} state is "full-gif"`);
      });
    }, 800);
  }
}

setTimeout(runInitialAssertions, 500);

let scrollTimer = null;
window.addEventListener("scroll", () => {
  clearTimeout(scrollTimer);
  scrollTimer = setTimeout(runInViewAssertions, 600);
});

log("Test page loaded. Scroll down to interact with GIF tiles.", "info");
log("Green border = full GIF loaded & playing, Yellow = thumbnail only, Orange = loading.", "info");
</script>
</body>
</html>
