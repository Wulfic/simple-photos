#This file pins the Gradle daemon to a Java 17 toolchain (Daemon JVM criteria,
#Gradle 8.8+). The Android Gradle Plugin requires JDK 17 to RUN; without this,
#building from a shell whose JAVA_HOME points at a different JDK (e.g. the JDK 11
#used by the RuneScape project) fails with "Android Gradle plugin requires Java
#17 to run". Gradle auto-detects an installed JDK 17 (or downloads one when a
#toolchain resolver is configured) regardless of JAVA_HOME, so the system
#default JDK — and other projects relying on it — are left untouched.
toolchainVersion=17
