name: Release Pipeline

# ──────────────────────────────────────────────────────────────────────────
# ONE pipeline to rule them all.
#
# Runs ONLY when a version tag (vX.Y.Z) is pushed. Regular commits to `dev`
# or `main` do NOT trigger anything — there are no push/PR/schedule runs left.
# A manual `workflow_dispatch` produces a preview / pre-release build.
#
# Strictly sequential, fail-closed gate chain (slow on purpose — every stage
# must be clean before the next one starts, so a release is only ever
# published when the WHOLE chain is green):
#
#   1. CodeQL            (Rust, Java/Kotlin, JS/TS, Python)   ── must be clean
#   2. Security Audit    (blocking gate + full audit report)  ── must be clean
#   3. CI / merge        (Rust+web build/test, E2E smoke)      ── must be green
#   4. Sync dev → main   (mirror release-clean tree to main)
#   5. Build + test      (server, .deb, .exe, .apk — installers smoke-tested)
#   6. Release           (checksums + GitHub Release)
#   7. Cleanup           (on a stable tag, delete ALL other releases + tags)
#
# Stages 2 and 3 are the reusable component workflows (security-audit.yml,
# ci.yml) called via `uses:`. They are no longer triggered on their own.
# ──────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for preview build (e.g. 1.0.0-dev1)'
        required: true
        default: '0.0.0-dev'

permissions:
  contents: write        # create the GitHub Release + push the dev→main sync
  security-events: write # CodeQL + security-audit SARIF upload
  actions: read          # required by CodeQL
  packages: read         # required by CodeQL

concurrency:
  # Never let two release pipelines clobber each other / the dev→main sync.
  group: release-pipeline-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Pin toolchains for reproducible release builds.
  # NOTE: Rust ≥1.88 is required by transitive deps (ort 2.0.0-rc.12,
  # image 0.25, time 0.3.47); they declare rust-version = 1.88.
  RUST_TOOLCHAIN: "1.88"
  NODE_VERSION: "20"

jobs:
  # ───────────────────────────────────────────────────────────────────────
  #  Stage 1 — CodeQL (BLOCKING). Must be clean before anything else runs.
  #
  #  Rust / JS-TS / Python use build-mode: none (no compilation needed).
  #  Java/Kotlin CANNOT use build-mode: none — it would silently skip all
  #  Kotlin source — so it builds the Android app (build-mode: manual) so
  #  CodeQL can trace Kotlin/Java compilation.
  #
  #  The default query suite is high-signal; the gate step fails the job on
  #  ANY reported result, so a finding blocks the release. Triage findings in
  #  the repo Security tab (alerts are still uploaded), fix them, or dismiss
  #  before re-tagging.
  # ───────────────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: rust
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
          - language: java-kotlin
            build-mode: manual
    steps:
      - uses: actions/checkout@v4

      # Android (Kotlin) needs a real build for CodeQL to extract it.
      - name: Set up JDK 17 (java-kotlin)
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK (java-kotlin)
        if: matrix.language == 'java-kotlin'
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Scope analysis to shipped code; the tests/ E2E harness is excluded
          # (see .github/codeql/codeql-config.yml).
          config-file: ./.github/codeql/codeql-config.yml

      # build-mode: manual → we must build between init and analyze so the
      # extractor sees the Kotlin/Java compilation. Debug build is enough for
      # source extraction and needs no signing secrets.
      - name: Build Android for extraction (java-kotlin)
        if: matrix.language == 'java-kotlin'
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon :app:assembleDebug

      - name: Perform CodeQL Analysis
        id: analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          upload: always

      # ───────────────────────────────────────────────────────────────────
      # Gate on OPEN code-scanning alerts, not raw SARIF results.
      #
      # The previous gate counted every result in the freshly-generated SARIF
      # (`jq '[.runs[].results[]?] | length'`). That count includes findings
      # the maintainer has already triaged and DISMISSED in the Security tab
      # (false positive / won't fix / used in tests) — dismissal is server-side
      # code-scanning state and never appears in the local SARIF, so the gate
      # could never reach zero no matter how many alerts were dismissed or how
      # many inline `// codeql[...]` suppressions were added.
      #
      # Instead: wait for GitHub to finish processing this run's upload, then
      # fail only if there is at least one OPEN (untriaged / unfixed) alert for
      # this language. Dismissed and fixed alerts do not block; a genuinely new
      # finding does, until it is triaged in the Security tab.
      # ───────────────────────────────────────────────────────────────────
      - name: Enforce CodeQL gate (block on OPEN alerts only)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MATRIX_LANGUAGE: ${{ matrix.language }}
          SARIF_ID: ${{ steps.analyze.outputs.sarif-id }}
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          auth=(-H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json")

          # CodeQL rule ids are language-prefixed; gate each matrix job only on
          # its own language so failures are attributable.
          case "${MATRIX_LANGUAGE}" in
            rust)                   prefix="rust/" ;;
            python)                 prefix="py/"   ;;
            javascript-typescript)  prefix="js/"   ;;
            java-kotlin)            prefix="java/" ;;
            *) echo "::error::Unmapped CodeQL language '${MATRIX_LANGUAGE}'"; exit 1 ;;
          esac

          if [ -z "${SARIF_ID:-}" ]; then
            echo "::error::analyze step produced no sarif-id — upload did not happen."
            exit 1
          fi

          # 1) Wait for GitHub to finish ingesting this run's SARIF so the alert
          #    list reflects the commit we are releasing (≈10 min ceiling).
          status=""
          for i in $(seq 1 60); do
            # Tolerate transient errors (the sarifs endpoint can 404 briefly
            # right after upload) — treat any failure as "pending" and retry.
            resp="$(curl -fsSL "${auth[@]}" "${api}/code-scanning/sarifs/${SARIF_ID}" 2>/dev/null || true)"
            status="$(echo "${resp}" | jq -r '.processing_status // "pending"' 2>/dev/null || echo pending)"
            echo "sarif ${SARIF_ID}: processing_status=${status} (attempt ${i}/60)"
            case "${status}" in
              complete) break ;;
              failed)   echo "::error::CodeQL SARIF processing failed for ${MATRIX_LANGUAGE}."; exit 1 ;;
            esac
            sleep 10
          done
          if [ "${status}" != "complete" ]; then
            echo "::error::Timed out waiting for CodeQL SARIF processing (${MATRIX_LANGUAGE})."
            exit 1
          fi

          # 2) Count OPEN alerts for this language repo-wide. We deliberately do
          #    NOT filter by ref: the code-scanning alert list is the maintainer's
          #    triage surface (kept at zero open), and a tag-ref filter can return
          #    nothing for a tag — which would make the gate silently pass. A
          #    repo-wide check is fail-closed: any untriaged finding blocks.
          alerts="$(curl -fsSL "${auth[@]}" \
            "${api}/code-scanning/alerts?state=open&tool_name=CodeQL&per_page=100")"
          open="$(echo "${alerts}" | jq --arg p "${prefix}" '[.[] | select(.rule.id | startswith($p))] | length')"

          if [ "${open}" -gt 0 ]; then
            echo "::error::${open} OPEN CodeQL alert(s) for ${MATRIX_LANGUAGE} — triage them in the Security tab (dismiss or fix) before releasing:"
            echo "${alerts}" | jq -r --arg p "${prefix}" \
              '.[] | select(.rule.id | startswith($p)) | "  #\(.number) [\(.rule.security_severity_level // .rule.severity)] \(.rule.id) :: \(.most_recent_instance.location.path):\(.most_recent_instance.location.start_line)"'
            exit 1
          fi
          echo "CodeQL clean for ${MATRIX_LANGUAGE}: no open alerts."

  # ───────────────────────────────────────────────────────────────────────
  #  Stage 2 — Security Audit (BLOCKING). Reusable workflow; its conclusion
  #  is `failure` whenever the blocking security-gate job finds a real,
  #  actionable problem.
  # ───────────────────────────────────────────────────────────────────────
  security:
    name: Security Audit
    needs: [codeql]
    uses: ./.github/workflows/security-audit.yml
    secrets: inherit

  # ───────────────────────────────────────────────────────────────────────
  #  Stage 3 — CI / merge validation (BLOCKING). Reusable workflow: Rust
  #  build + clippy + unit tests, web typecheck + build, Python E2E smoke.
  # ───────────────────────────────────────────────────────────────────────
  ci:
    name: CI
    needs: [security]
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ───────────────────────────────────────────────────────────────────────
  #  Stage 4 — Sync dev → main (release-clean). Only runs once CodeQL +
  #  security + CI are all green. Mirrors dev's tree to `main` minus the
  #  paths in .github/sync-main-exclude.txt, so `main` always reflects a
  #  fully-validated, shippable release.
  # ───────────────────────────────────────────────────────────────────────
  sync:
    name: Sync dev → main
    needs: [ci]
    if: github.repository == 'Wulfic/simple-photos'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build a clean tree from dev
        id: build
        run: |
          set -euo pipefail
          DEV_SHA="$(git rev-parse HEAD)"
          DEV_SUBJECT="$(git log -1 --pretty=%s)"
          echo "dev_sha=$DEV_SHA"      >> "$GITHUB_OUTPUT"
          echo "dev_subject=$DEV_SUBJECT" >> "$GITHUB_OUTPUT"

          # Read the exclusion list (skip blanks/comments).
          mapfile -t EXCLUDES < <(grep -Ev '^\s*(#|$)' .github/sync-main-exclude.txt)

          # Remove excluded paths from the working tree + index.
          for p in "${EXCLUDES[@]}"; do
            if [[ -e "$p" ]]; then
              echo "removing $p"
              git rm -rf --quiet "$p"
            else
              echo "skip (missing) $p"
            fi
          done

          # Commit the cleanup as the new main tip. The parent is the previous
          # main tip so users see a linear sync history; force-push handles
          # the case where dev rewrote history.
          git fetch origin main:refs/remotes/origin/main || true
          if git rev-parse --verify refs/remotes/origin/main >/dev/null 2>&1; then
            PARENT="$(git rev-parse refs/remotes/origin/main)"
          else
            PARENT=""
          fi

          # If nothing actually changed vs. current main tree, skip.
          if [[ -n "$PARENT" ]]; then
            DEV_TREE="$(git write-tree)"
            MAIN_TREE="$(git rev-parse "$PARENT^{tree}")"
            if [[ "$DEV_TREE" == "$MAIN_TREE" ]]; then
              echo "main is already in sync — nothing to do"
              echo "skip=1" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Build the commit object directly (avoids polluting dev's HEAD).
          MSG=$(printf 'sync: dev → main (release-clean)\n\nUpstream: %s\n%s\n' "$DEV_SHA" "$DEV_SUBJECT")
          if [[ -n "$PARENT" ]]; then
            COMMIT="$(git commit-tree "$(git write-tree)" -p "$PARENT" -m "$MSG")"
          else
            COMMIT="$(git commit-tree "$(git write-tree)" -m "$MSG")"
          fi
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"

      - name: Push to main
        if: steps.build.outputs.skip != '1'
        run: |
          set -euo pipefail
          git push --force-with-lease origin "${{ steps.build.outputs.commit }}:refs/heads/main"

  # ───────────────────────────────────────────────────────────────────────
  #  Stage 5 — resolve the version once and share with all build jobs.
  # ───────────────────────────────────────────────────────────────────────
  version:
    needs: [sync]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: resolve
        # Route github context values through env vars to prevent expression
        # injection / code injection in actions (CWE-94). `github.event.inputs.version`
        # is user-controlled (workflow_dispatch) and must never be interpolated
        # directly into a shell `run:` block.
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_INPUT_VERSION: ${{ github.event.inputs.version }}
        shell: bash
        run: |
          if [[ "$GH_EVENT_NAME" == "push" ]]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v="$GH_INPUT_VERSION"
          fi
          # Strict semver-ish allowlist: digits, dots, plus optional pre-release
          # tag (alnum + dot + dash). Reject anything else fast and loud.
          if [[ ! "$v" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version string: '$v' (expected semver)"
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $v"

  # ───────────────────────────────────────────────────────────────────────
  #  Web frontend build — shared by both .deb and .exe so we build once.
  # ───────────────────────────────────────────────────────────────────────
  web:
    needs: [sync]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      # `npm ci` enforces package-lock.json — no "latest" version drift.
      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web frontend
        working-directory: web
        run: npm run build

      - name: Upload web/dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────
  #  .deb package — Ubuntu 24.04 is required because the ORT prebuilt
  #  onnxruntime C++ library references glibc ≥2.38 symbols
  #  (`__isoc23_strtol`); building on 22.04 fails to link. Produced .deb
  #  therefore targets Ubuntu 24.04+ / Debian 13+. The .deb is installed,
  #  asserted, and removed (smoke test) before it is uploaded.
  # ───────────────────────────────────────────────────────────────────────
  deb:
    needs: [version, web]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server -> target
          key: deb-${{ env.RUST_TOOLCHAIN }}

      - name: Install build deps (cmake, clang, perl)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev cmake make g++ libclang-dev perl

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb

      # The .deb is GPU-capable: built with the default `cuda` feature so the
      # ONNX Runtime CUDA EP is compiled in. The EP and its provider .so files
      # are loaded lazily (dlopen) at first inference, so the SAME .deb still
      # runs on GPU-less hosts (falls back to CPU). The provider .so files are
      # bundled into /usr/lib/simple-photos via cargo-deb assets; the systemd
      # unit puts that dir on LD_LIBRARY_PATH. The CUDA runtime itself comes
      # from nvidia-cuda-toolkit (a Recommends, installed by apt by default).
      - name: Build server (release, CUDA-enabled)
        working-directory: server
        run: cargo build --release --locked

      - name: Verify ONNX Runtime CUDA provider libs were produced
        working-directory: server
        run: |
          set -euo pipefail
          echo "Provider libs in target/release:"
          ls -la target/release/libonnxruntime_providers_*.so || true
          for lib in libonnxruntime_providers_shared.so libonnxruntime_providers_cuda.so; do
            if [ ! -f "target/release/$lib" ]; then
              echo "::error::Expected ORT provider lib target/release/$lib not found after the CUDA build."
              echo "  ort's copy-dylibs feature should produce it. If the upstream filename changed,"
              echo "  update the bundled-asset names in server/Cargo.toml to match."
              exit 1
            fi
          done

      - name: Stamp release version into the asset fetcher (APK download URL)
        run: |
          set -euo pipefail
          sed -i "s/@SP_VERSION@/${{ needs.version.outputs.version }}/" \
            packaging/debian/fetch-assets.sh
          grep -n 'SP_APK_VERSION=' packaging/debian/fetch-assets.sh

      - name: Build .deb
        working-directory: server
        run: cargo deb --no-build --no-strip

      - name: Rename artefact with resolved version
        run: |
          mkdir -p dist
          cp server/target/debian/*.deb dist/simple-photos_${{ needs.version.outputs.version }}_amd64.deb
          ls -la dist/

      - name: Lint .deb with lintian (best-effort)
        continue-on-error: true
        run: |
          sudo apt-get install -y --no-install-recommends lintian
          lintian --no-tag-display-limit dist/*.deb || true

      - name: Smoke-test .deb install
        run: |
          set -x
          # --no-install-recommends: skip the multi-GB nvidia-cuda-toolkit
          # Recommends — the GPU runtime is not what this structural smoke test
          # validates, and pulling it would massively slow CI. The package still
          # installs all hard Depends (ffmpeg, curl, unzip, ...).
          sudo apt-get install -y --no-install-recommends ./dist/simple-photos_${{ needs.version.outputs.version }}_amd64.deb
          # systemd-units enable=true, start=false: service is loaded but inactive.
          # `systemctl status` returns 3 for inactive units; absorb that with `:`.
          systemctl status simple-photos --no-pager || :
          # /var/lib/simple-photos is mode 750 owned by simple-photos:simple-photos,
          # so the runner user cannot stat children directly — use sudo for asserts.
          sudo ls -la /usr/bin/simple-photos-server
          sudo ls -la /etc/simple-photos/
          sudo ls -la /var/lib/simple-photos/
          sudo test -x /usr/bin/simple-photos-server
          sudo test -f /etc/simple-photos/config.toml
          sudo test -d /var/lib/simple-photos/storage
          # GPU: the CUDA EP provider libs must be bundled for GPU inference.
          sudo test -f /usr/lib/simple-photos/libonnxruntime_providers_cuda.so
          sudo test -f /usr/lib/simple-photos/libonnxruntime_providers_shared.so
          # Icon + desktop entry (issue #3) and the first-run fetch oneshot.
          sudo test -f /usr/share/applications/simple-photos.desktop
          sudo test -f /usr/share/icons/hicolor/256x256/apps/simple-photos.png
          sudo test -f /lib/systemd/system/simple-photos-setup.service
          # Postinst should have replaced CHANGE_ME_AT_INSTALL_TIME with a hex secret.
          if sudo grep -q "CHANGE_ME_AT_INSTALL_TIME" /etc/simple-photos/config.toml; then
            echo "::error::JWT placeholder was not replaced by postinst"
            exit 1
          fi
          # Stop the background asset fetch before removal so it doesn't race the
          # uninstall (prerm also stops it; this just keeps the test log clean).
          sudo systemctl stop simple-photos-setup.service || :
          sudo apt-get remove -y simple-photos

      - uses: actions/upload-artifact@v4
        with:
          name: simple-photos-deb
          path: dist/*.deb
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────
  #  Windows installer — builds the .exe + bundles NSSM + Inno Setup, then
  #  silently installs / verifies / uninstalls it (smoke test).
  # ───────────────────────────────────────────────────────────────────────
  windows:
    needs: [version, web]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server -> target
          key: win-${{ env.RUST_TOOLCHAIN }}

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      # Windows ships with the `cuda` feature compiled in. The ORT CUDA EP
      # `dlopen`s `cudart64_*.dll` / `cublas64_*.dll` lazily at runtime, so
      # the same binary runs unmodified on machines without a GPU (it falls
      # back to CPU). Users with an NVIDIA card + CUDA Toolkit installed
      # automatically get acceleration without rebuilding.
      - name: Build server (release, CUDA-enabled)
        working-directory: server
        run: cargo build --release --locked

      - name: Fetch NSSM 2.24 (via Chocolatey for reliability)
        shell: pwsh
        run: |
          # nssm.cc is frequently 503; pull the binary from Chocolatey instead.
          # --force ensures the package is re-extracted even if the agent has
          # cached metadata from a previous run (otherwise tools\ may be empty).
          choco install nssm --version=2.24.101.20180116 -y --force --no-progress
          $nssmSrc = (Get-ChildItem -Recurse -Path 'C:\ProgramData\chocolatey\lib' `
                       -Filter 'nssm.exe' -ErrorAction SilentlyContinue |
                       Select-Object -First 1).FullName
          if (-not $nssmSrc) {
            Write-Error "nssm.exe not found under C:\ProgramData\chocolatey\lib after choco install"
            Get-ChildItem -Recurse -Path 'C:\ProgramData\chocolatey\lib\NSSM' -ErrorAction SilentlyContinue |
              Select-Object FullName
            exit 1
          }
          Write-Host "Using NSSM at: $nssmSrc"
          New-Item -ItemType Directory -Path packaging\windows\vendor -Force | Out-Null
          Copy-Item $nssmSrc packaging\windows\vendor\nssm.exe -Force
          & packaging\windows\vendor\nssm.exe version

      - name: Fetch Visual C++ Redistributable (x64)
        shell: pwsh
        run: |
          # REQUIRED runtime — the MSVC-built server.exe and onnxruntime.dll
          # both link VCRUNTIME140.dll / MSVCP140.dll. Bundled into the
          # installer and run silently before the service starts so a clean
          # Windows box can actually launch the server (and survive reboot).
          New-Item -ItemType Directory -Path packaging\windows\vendor -Force | Out-Null
          $dest = 'packaging\windows\vendor\vc_redist.x64.exe'
          Invoke-WebRequest -Uri 'https://aka.ms/vs/17/release/vc_redist.x64.exe' `
                            -OutFile $dest -UseBasicParsing
          if (-not (Test-Path $dest) -or (Get-Item $dest).Length -lt 1MB) {
            Write-Error "vc_redist.x64.exe download failed or is too small"
            exit 1
          }
          Write-Host "Fetched vc_redist.x64.exe ($((Get-Item $dest).Length) bytes)"

      - name: Locate / install Inno Setup 6
        id: inno
        shell: pwsh
        run: |
          # windows-latest preinstalls Inno Setup; only install if missing.
          $candidates = @(
            'C:\Program Files (x86)\Inno Setup 6\ISCC.exe',
            'C:\Program Files\Inno Setup 6\ISCC.exe'
          )
          $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) {
            choco install innosetup -y --no-progress
            $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          }
          if (-not $iscc) {
            Write-Error "ISCC.exe not found after install attempt"
            exit 1
          }
          Write-Host "Using ISCC at: $iscc"
          "iscc=$iscc" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          & "${{ steps.inno.outputs.iscc }}" `
              "/DSP_VERSION=${{ needs.version.outputs.version }}" `
              packaging\windows\simple-photos.iss
          Get-ChildItem dist

      - name: Smoke-test installer (silent install + verify + uninstall)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $setup  = (Get-ChildItem dist -Filter '*.exe' | Select-Object -First 1).FullName
          $instDir = "$env:ProgramFiles\SimplePhotos"
          $logFile = "$env:RUNNER_TEMP\sp-install.log"
          Write-Host "Installing $setup silently to $instDir"
          # /VERYSILENT /SUPPRESSMSGBOXES → no UI; /NORESTART → never reboot the runner;
          # /TASKS="" → install only the default file set (no service / firewall /
          # asset download — those need privileges + network we don't want to depend on).
          $proc = Start-Process -FilePath $setup `
              -ArgumentList @('/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART',
                              '/TASKS=""',"/LOG=$logFile") `
              -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            Write-Host "--- install log ---"
            if (Test-Path $logFile) { Get-Content $logFile | Select-Object -Last 80 }
            throw "Installer exited with code $($proc.ExitCode)"
          }

          Write-Host "--- installed tree ---"
          Get-ChildItem -Recurse $instDir | Select-Object FullName | Format-Table -AutoSize

          # Required files must be present.
          $required = @(
            "$instDir\simple-photos-server.exe",
            "$instDir\web\index.html",
            "$instDir\bin\nssm.exe",
            "$instDir\migrations",
            "$instDir\unins000.exe"
          )
          foreach ($p in $required) {
            if (-not (Test-Path $p)) { throw "Missing post-install path: $p" }
          }

          # The server binary has no CLI parser, so we don't try to invoke it.
          # Instead, confirm it is a real native executable (PE header "MZ") and
          # that Windows can read its file version metadata.
          $bytes = [System.IO.File]::ReadAllBytes("$instDir\simple-photos-server.exe")[0..1]
          if ($bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
            throw "simple-photos-server.exe is not a valid PE binary (missing MZ header)"
          }
          $sz = (Get-Item "$instDir\simple-photos-server.exe").Length
          Write-Host "simple-photos-server.exe size: $sz bytes"
          if ($sz -lt 1MB) { throw "simple-photos-server.exe is suspiciously small ($sz bytes)" }

          Write-Host "--- uninstalling ---"
          $uninst = "$instDir\unins000.exe"
          $proc = Start-Process -FilePath $uninst `
              -ArgumentList @('/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART') `
              -Wait -PassThru
          if ($proc.ExitCode -ne 0) { throw "Uninstaller exited with code $($proc.ExitCode)" }

      - uses: actions/upload-artifact@v4
        with:
          name: simple-photos-windows
          path: dist/*.exe
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────
  #  Android APK — release build, signed if the keystore secrets are set
  #  in the repo, otherwise produced unsigned-but-debug-signed (still
  #  installable, just not from Play / not auto-updatable). To enable
  #  proper release signing, configure these repository secrets:
  #
  #    ANDROID_KEYSTORE_BASE64    — base64 of release.jks
  #    ANDROID_KEYSTORE_PASSWORD  — keystore password
  #    ANDROID_KEY_ALIAS          — key alias
  #    ANDROID_KEY_PASSWORD       — key password
  #
  #  See android/app/build.gradle.kts for how these are consumed.
  # ───────────────────────────────────────────────────────────────────────
  android:
    needs: [version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties', 'android/gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Decode release keystore (if configured)
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        shell: bash
        run: |
          if [ -z "${KEYSTORE_BASE64:-}" ]; then
            echo "No ANDROID_KEYSTORE_BASE64 secret set — release APK will be signed with the debug keystore."
            echo "ks=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p android/app/keystore
          ks=android/app/keystore/release.jks
          echo "$KEYSTORE_BASE64" | base64 -d > "$ks"
          if [ ! -s "$ks" ]; then
            echo "::error::Decoded keystore is empty — check ANDROID_KEYSTORE_BASE64 secret."
            exit 1
          fi
          echo "ks=$(pwd)/$ks" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_FILE:     ${{ steps.keystore.outputs.ks }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD:      ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon :app:assembleRelease

      - name: Stage APK with versioned name
        run: |
          mkdir -p dist
          src=$(ls android/app/build/outputs/apk/release/*.apk | head -1)
          if [ -z "$src" ]; then
            echo "::error::No APK produced under android/app/build/outputs/apk/release/"
            exit 1
          fi
          cp "$src" "dist/simple-photos-${{ needs.version.outputs.version }}.apk"
          ls -la dist/

      - name: Smoke-test APK (structure, signature, manifest)
        run: |
          set -euo pipefail
          APK="dist/simple-photos-${{ needs.version.outputs.version }}.apk"
          BUILD_TOOLS_DIR=$(ls -d "$ANDROID_SDK_ROOT/build-tools"/* | sort -V | tail -1)
          AAPT="$BUILD_TOOLS_DIR/aapt"
          APKSIGNER="$BUILD_TOOLS_DIR/apksigner"

          echo "--- aapt badging ---"
          "$AAPT" dump badging "$APK" | head -20

          # Confirm the package id is what we ship.
          PKG=$("$AAPT" dump badging "$APK" | awk -F"'" '/^package:/ {print $2}')
          if [[ "$PKG" != "com.simplephotos" ]]; then
            echo "::error::Unexpected APK package id: $PKG (want com.simplephotos)"
            exit 1
          fi

          # Required components must be declared in the manifest.
          MANIFEST=$("$AAPT" dump xmltree "$APK" AndroidManifest.xml)
          for needle in "MainActivity" "INTERNET"; do
            if ! echo "$MANIFEST" | grep -q "$needle"; then
              echo "::error::APK manifest missing $needle"
              exit 1
            fi
          done

          echo "--- apksigner verify ---"
          "$APKSIGNER" verify --print-certs "$APK"

      - uses: actions/upload-artifact@v4
        with:
          name: simple-photos-android
          path: dist/*.apk
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────
  #  Stage 6 — compute SHA256 sums and create the GitHub Release. Only runs
  #  once every installer above has built AND passed its smoke test.
  # ───────────────────────────────────────────────────────────────────────
  release:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [version, deb, windows, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: simple-photos-deb
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: simple-photos-windows
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: simple-photos-android
          path: dist

      - name: Compute checksums
        working-directory: dist
        run: |
          sha256sum *.deb *.exe *.apk > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Tag pushes (vX.Y.Z) → published stable release.
          # workflow_dispatch → immediate pre-release (preview/dev build).
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' }}
          name: "Simple Photos ${{ needs.version.outputs.version }}"
          tag_name: ${{ github.event_name == 'push' && github.ref_name || format('v{0}', needs.version.outputs.version) }}
          generate_release_notes: true
          files: |
            dist/*.deb
            dist/*.exe
            dist/*.apk
            dist/SHA256SUMS.txt

  # ───────────────────────────────────────────────────────────────────────
  #  Stage 7 — cleanup: when a stable tag (vX.Y.Z, no -suffix) is pushed,
  #  delete EVERY other GitHub Release (stable + preview pre-releases) and
  #  its git tag, so the Releases page only ever shows the single release we
  #  just published. Also sweeps up orphan version tags that have no release.
  #
  #  Gated to stable pushes only: a `workflow_dispatch` preview build must
  #  never wipe the shipped stable release.
  # ───────────────────────────────────────────────────────────────────────
  cleanup-releases:
    runs-on: ubuntu-latest
    needs: [release]
    if: github.event_name == 'push' && !contains(github.ref_name, '-')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Delete all releases and tags except the current one
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          KEEP="${GITHUB_REF_NAME}"
          echo "Keeping ONLY the current release: $KEEP"

          # ── 1. Delete every release (stable or pre-release) except $KEEP,
          #       removing the backing git tag along with each one.
          mapfile -t RELEASES < <(gh release list --limit 1000 \
            --json tagName --jq '.[].tagName')

          for tag in "${RELEASES[@]}"; do
            if [[ "$tag" == "$KEEP" ]]; then
              echo "Skipping $tag (current release)."
              continue
            fi
            echo "Deleting release + tag: $tag"
            gh release delete "$tag" --cleanup-tag --yes || \
              echo "::warning::Failed to delete release $tag (may already be gone)"
          done

          # ── 2. Sweep up orphan version tags (vX.Y.Z[-suffix]) that have no
          #       release attached — e.g. tags pushed but whose release was
          #       already removed, or tags that never produced a release.
          git fetch --tags --quiet origin || true
          mapfile -t TAGS < <(git tag --list 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$' || true)

          for tag in "${TAGS[@]}"; do
            if [[ "$tag" == "$KEEP" ]]; then
              continue
            fi
            echo "Deleting orphan tag: $tag"
            git push origin ":refs/tags/$tag" || \
              echo "::warning::Failed to delete tag $tag (may already be gone)"
          done

          echo "Cleanup complete — only $KEEP remains."
