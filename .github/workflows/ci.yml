name: CI

# Reusable component of the unified Release Pipeline (pipeline.yml).
# Rust build/clippy/unit tests, web typecheck/build, Python E2E smoke.
#
# This workflow has NO triggers of its own — it only runs when the Release
# Pipeline calls it via `workflow_call` after CodeQL + the security audit are
# clean. Nothing runs on a plain push or PR anymore; a release is validated
# end-to-end only when a version tag is pushed.

on:
  workflow_call:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Rust ≥1.88 required by transitive deps (ort, image, time).
  RUST_TOOLCHAIN: "1.88"
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"

jobs:
  rust:
    name: Rust (build + clippy + test)
    # 24.04 ships glibc 2.39 which exports __isoc23_strtol/strtoll, required by
    # the prebuilt ONNX Runtime that `ort` links against.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server -> target

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev cmake make g++ libclang-dev perl

      - name: Format check
        working-directory: server
        run: cargo fmt --all -- --check

      - name: Clippy (CPU build, all warnings = errors)
        working-directory: server
        run: cargo clippy --no-default-features --all-targets --locked -- -D warnings

      - name: Build
        working-directory: server
        run: cargo build --no-default-features --locked

      - name: Unit tests
        working-directory: server
        run: cargo test --no-default-features --locked

  web:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - working-directory: web
        run: npm ci

      - working-directory: web
        run: npm run build

  python-tests:
    name: Python E2E (smoke)
    runs-on: ubuntu-24.04
    needs: [rust, web]
    # Tests live on `dev` only; main is the lean release branch and has no
    # tests/ directory. The pipeline tags `dev` tips, so the tagged tree still
    # carries tests/ — run the E2E smoke on tag pushes too.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'tests/requirements.txt'

      - name: Install pinned test deps
        run: pip install --require-hashes -r tests/requirements.txt || pip install -r tests/requirements.txt

      - name: Verify pin policy (no >= or ~=)
        shell: bash
        run: |
          if grep -E '^[A-Za-z][^#]*[~>]=' tests/requirements.txt; then
            echo "::error::tests/requirements.txt must use exact `==` pins."
            exit 1
          fi
