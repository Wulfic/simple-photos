# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# `vulnerability` / `notice` keys removed in cargo-deny 0.16+: vulnerabilities
# in non-ignored crates always fail the check; notice is now informational.
unmaintained = "workspace"
yanked = "warn"
ignore = [
    # rsa Marvin Attack (RUSTSEC-2023-0071) — transitive via sqlx-mysql, no fix available
    "RUSTSEC-2023-0071",
    # paste unmaintained (RUSTSEC-2024-0436) — transitive via rav1e/image, no action possible
    "RUSTSEC-2024-0436",
    # rustls-pemfile unmaintained (RUSTSEC-2025-0134) — transitive via axum-server, awaiting upstream migration
    "RUSTSEC-2025-0134",
    # rand unsound with custom logger (RUSTSEC-2026-0097) — low risk, no custom logger used
    "RUSTSEC-2026-0097",
]

[licenses]
# `unlicensed` / `copyleft` keys removed in cargo-deny 0.16+: an explicit
# allowlist below is now the sole license-policy mechanism. Anything not in
# `allow` fails the check.
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "OpenSSL",
    "CC0-1.0",
    "MPL-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
deny = [
    # Outdated/insecure crates
    { name = "openssl", wrappers = ["openssl-sys"] },
]

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
