[server]
host = "0.0.0.0"
port = 3000
base_url = "http://localhost:3000"
# Set to true ONLY when behind a reverse proxy (nginx, Caddy) that sets
# X-Forwarded-For. When false, proxy headers are ignored for rate limiting.
trust_proxy = false
# Dedicated LAN discovery port. All Simple Photos servers listen on this
# port so clients can find them by scanning a single well-known port.
# The listener returns the server's name, version, and actual HTTP port.
# Set to 0 to disable. Default: 3301.
# discovery_port = 3301

[database]
path = "/data/db/simple-photos.db"
max_connections = 16

[storage]
# ── Storage root ─────────────────────────────────────────────────────────────
# Can be any path reachable by the server process:
#
# Linux / macOS:
#   Local directory:
#     root = "/data/storage"
#
#   Network drive (SMB/CIFS) — mount first, then point here:
#     sudo mount -t cifs //vault.local/vault/Files/Simple-Photos /mnt/simple-photos \
#          -o username=YOUR_USER,password=YOUR_PASS,uid=1000,gid=1000,vers=3.0
#     root = "/mnt/simple-photos"
#
#   Or use /etc/fstab for persistent mounts:
#     //vault.local/vault/Files/Simple-Photos /mnt/simple-photos cifs \
#       credentials=/etc/samba/credentials,uid=1000,gid=1000,vers=3.0 0 0
#
#   NFS:
#     root = "/mnt/nfs/simple-photos"
#
# Windows:
#   Local directory:
#     root = "C:\\SimplePhotos\\storage"
#
#   Mapped network drive:
#     root = "Z:\\SimplePhotos"
#
#   UNC path:
#     root = "\\\\server\\share\\SimplePhotos"
#
# The server uses cross-platform file I/O, so any accessible path works.
root = "/data/storage"

# Per-user quota in bytes. 0 = unlimited.
default_quota_bytes = 10737418240   # 10 GB

# Max size per single upload. 5 GiB default to support large video files.
max_blob_size_bytes = 5368709120    # 5 GB

[auth]
# IMPORTANT: Change this to a random 64-char hex string in production!
# Generate with:
#   Linux/macOS: openssl rand -hex 32
#   PowerShell:  -join ((1..32) | ForEach-Object { '{0:x2}' -f (Get-Random -Max 256) })
jwt_secret = "CHANGE_ME_RANDOM_64_CHAR_HEX"
access_token_ttl_secs = 3600
refresh_token_ttl_days = 30
allow_registration = true           # set false after initial setup
bcrypt_cost = 12

[web]
# Path to built React SPA (web/dist/). Set to "" to disable web frontend.
static_root = "./web/dist"

[backup]
# API key that other servers must provide to pull photos from this instance.
# Generate with: openssl rand -hex 32
# api_key = ""
# Accept self-signed/invalid TLS certificates when connecting to backup servers.
# Default: true (for self-hosted LAN setups). Set to false in production with
# proper CA-signed certificates.
# accept_invalid_certs = true

[scan]
# How often (seconds) to scan the storage directory for new files.
# Default: 300 (5 minutes). Set to 0 to disable background scanning.
auto_scan_interval_secs = 300

[tls]
# Enable HTTPS with a TLS certificate.
# Set enabled = true and provide paths to your certificate and private key.
enabled = false
# cert_path = "/path/to/fullchain.pem"
# key_path = "/path/to/privkey.pem"

[ai]
# AI face & object recognition. Without ONNX models, uses advanced
# colour/texture/edge heuristic analysis to classify scenes and content
# into 25+ categories (landscape, sunset, food, architecture, etc).
# With ONNX model files in model_dir, uses ML models for higher accuracy.
# GPU acceleration (CUDA) is used when available, falls back to CPU.
enabled = false
# gpu_preferred = true
# batch_size = 8                  # images per inference batch
# threads = 0                     # 0 = auto-detect (physical cores)
# photos_per_minute = 60          # rate limit for background processing
# face_confidence = 0.7           # minimum face detection confidence
# object_confidence = 0.5         # minimum object detection confidence
# face_similarity_threshold = 0.6 # cosine distance for face clustering
# model_dir = "models"            # directory containing ONNX models
# quality = "high"                # "fast", "balanced", or "high" — higher = slower but more accurate

[geo]
# Geolocation & timestamp smart albums. Resolves GPS coordinates to
# city/country using an offline GeoNames dataset and generates smart
# albums by location and timeline.
enabled = false
# dataset_path = "data/geonames/cities500.txt"  # GeoNames cities file
# batch_size = 100                               # photos per geocoding batch

[transcode]
# GPU-accelerated video transcoding. Auto-detects NVIDIA NVENC, Intel QSV,
# VAAPI, or AMD AMF at startup. Falls back to CPU (libx264) seamlessly.
gpu_enabled = true
gpu_fallback_to_cpu = true
# gpu_device = ""  # specific GPU device path (empty = auto-detect)
