services:
  server:
    build: .
    container_name: simple-photos
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./web/dist:/app/web/dist:ro
      - photos_db:/data/db
      - photos_storage:/data/storage
    environment:
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  photos_db:
  photos_storage:
