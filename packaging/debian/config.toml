[server]
host = "0.0.0.0"
port = 8080
base_url = "http://localhost:8080"
trust_proxy = false

[database]
path = "/var/lib/simple-photos/db/simple-photos.db"
max_connections = 16

[storage]
# This default is created by the postinst script. The first-run setup
# wizard (web UI) is the canonical place to choose the photo storage
# root — it can be moved to any path the `simple-photos` user can read.
root = "/var/lib/simple-photos/storage"
default_quota_bytes = 10737418240
max_blob_size_bytes = 5368709120

[auth]
# REQUIRED: replaced by the postinst script with a 64-char random hex.
# Do NOT commit a real secret here.
jwt_secret = "CHANGE_ME_AT_INSTALL_TIME"
access_token_ttl_secs = 3600
refresh_token_ttl_days = 30
allow_registration = true
bcrypt_cost = 12

[web]
static_root = "/usr/share/simple-photos/web"

[backup]

[tls]
enabled = false

[geo]
# Reverse geocoding via the offline GeoNames cities500 dataset. OFF by default
# (matches the server default and the Windows package). The setup service's
# fetch-assets.sh downloads the dataset to this exact path, so enabling geo
# (here or in Settings) works immediately.
#
# dataset_path MUST be absolute and match fetch-assets.sh. The server's
# GeoConfig default is the RELATIVE "data/cities500.txt", which resolves against
# WorkingDirectory=/var/lib/simple-photos → /var/lib/simple-photos/data/...,
# i.e. NOT where fetch-assets.sh writes it (/var/lib/simple-photos/cities500.txt)
# — so without this override reverse geocoding silently stays "unavailable" on
# every .deb install (issue #5a). The absolute path also makes the runtime
# self-heal download land where the server actually looks.
enabled = false
dataset_path = "/var/lib/simple-photos/cities500.txt"
