services:
  backup-1:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: simple-photos-backup-1
    restart: unless-stopped
    ports:
      - "8081:3000"
    volumes:
      - ./backup-1/config.toml:/app/config.toml:ro
      - ../web/dist:/app/web/dist:ro
      - ./backup-1/data/db:/data/db
      - ./backup-1/data/storage:/data/storage
    environment:
      - RUST_LOG=info
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

